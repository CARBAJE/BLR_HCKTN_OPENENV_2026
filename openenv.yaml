spec_version: 1
name: react_os
type: space
runtime: fastapi
app: server.app:app
port: 8000
description: >
  A simulated React OS environment for training GUI navigation agents
  via Reinforcement Learning. Agents observe a structured DOM, issue
  mouse/keyboard actions, and receive shaped reward signals.
reward_range: [0.0, 1.0]
max_steps: 30
tasks:
  - click_start
  - open_terminal
  - open_explorer
  - open_settings
  - open_downloads
  - open_recycle_bin
  - install_python
  - open_notepad
  - open_documents
  - open_file_terminal
